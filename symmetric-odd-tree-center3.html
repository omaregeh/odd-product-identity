<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Symmetric Odd Number Tree (Center: 3)</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --pill-teal:#31b7a8;
      --pill-yellow:#f6c21a;
      --pill-red:#ff5b4d;
      --text:#0f172a;
      --muted:#475569;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:var(--bg);
    }
    .wrap{
      max-width: 1200px;
      margin: 24px auto 60px;
      padding: 0 16px;
    }
    h1{
      font-size: 20px;
      margin: 0 0 10px;
      font-weight: 700;
    }
    .sub{
      color: var(--muted);
      margin: 0 0 18px;
      line-height: 1.4;
      font-size: 14px;
    }

    .controls{
      display:flex;
      gap:16px;
      align-items:center;
      flex-wrap:wrap;
      padding: 14px 14px;
      background:white;
      border-radius: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }
    .controls label{
      font-size: 13px;
      color: var(--muted);
      display:flex;
      gap:10px;
      align-items:center;
    }
    .controls input[type="range"]{
      width: 260px;
    }
    .controls .value{
      font-weight: 700;
      color: var(--text);
      min-width: 34px;
      text-align:right;
    }

    .eq-area{
      background:white;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px 14px 22px;
      overflow-x:auto;
      position: relative;
    }

    /* Optional faint center guide line to emphasize the "tree" */
    .eq-area::before{
      content:"";
      position:absolute;
      top: 12px;
      bottom: 12px;
      left: 50%;
      width: 2px;
      transform: translateX(-1px);
      background: rgba(15, 23, 42, 0.04);
      pointer-events:none;
    }

    /* TREE LAYOUT: left sum | centered expression | right multiplication */
    .row{
      display: grid;
      grid-template-columns: 120px 1fr 140px;
      align-items: center;
      column-gap: 14px;
      padding: 10px 8px;
      white-space: nowrap;
      position: relative;
      z-index: 1; /* above the guide line */
    }

    .left{ justify-self: start; }

    .mid{
      justify-self: center;            /* THIS is what fixes the slant */
      display: inline-flex;
      align-items: center;
    }

    .right{
      justify-self: start;
      font-weight: 800;
      color:#111827;
      opacity: 0.95;
    }
    .right .times{
      padding: 0 6px;
      opacity: 0.85;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      color: white;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.2px;
      box-shadow: 0 10px 18px rgba(15,23,42,0.10);
    }
    .pill.teal{ background: var(--pill-teal); }
    .pill.yellow{
      background: var(--pill-yellow);
      color: #111827;
      box-shadow: 0 12px 20px rgba(246, 194, 26, 0.30);
    }
    .pill.red{ background: var(--pill-red); }

    .eq{
      font-weight: 800;
      color: #111827;
      opacity: 0.95;
      min-width: 18px;
      text-align:center;
      margin-right: 10px;
    }
    .plus{
      font-weight: 800;
      color: #111827;
      opacity: 0.45;
      margin: 0 8px;
      min-width: 10px;
      text-align:center;
    }

    .legend{
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .legend code{
      background:#eef2ff;
      padding: 2px 6px;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Symmetric Odd Number Tree (Center: 3)</h1>
    <p class="sub">
      Each row is a symmetric run of consecutive odd numbers centered at <b>3</b>.
      The sum is always <b>center × (number of terms)</b>.
    </p>

    <div class="controls">
      <label>
        Rows (depth):
        <input id="depth" type="range" min="0" max="20" value="6"/>
        <span class="value" id="depthVal">6</span>
      </label>
      <label>
        Show "etc" on last row
        <input id="showEtc" type="checkbox" checked/>
      </label>
    </div>

    <div class="eq-area" id="eqArea"></div>

    <div class="legend">
      Pattern:
      row <code>n</code> has <code>2n+1</code> terms:
      <code>center-2n, center-2n+2, ..., center+2n</code>.
      Sum = <code>center × (2n+1)</code>.
    </div>
  </div>

  <script>
    const CENTER = 3;

    function buildRow(n){
      const m = 2*n + 1;               // number of terms
      const start = CENTER - 2*n;
      const terms = [];
      for(let i=0;i<m;i++){
        terms.push(start + 2*i);
      }
      const sum = CENTER * m;
      return { n, m, terms, sum };
    }

    function pillHTML(value){
      const cls = (value === CENTER) ? "pill yellow" : "pill teal";
      return `<span class="${cls}">${value}</span>`;
    }

    function render(){
      const depth = Number(document.getElementById("depth").value);
      const showEtc = document.getElementById("showEtc").checked;
      document.getElementById("depthVal").textContent = depth;

      const eqArea = document.getElementById("eqArea");
      eqArea.innerHTML = "";

      for(let n=0; n<=depth; n++){
        const { m, terms, sum } = buildRow(n);

        const left = `<span class="pill red">${sum}</span>`;

        const mid = terms.map((t, i) => {
          const p = pillHTML(t);
          return (i === 0) ? p : `<span class="plus">+</span>${p}`;
        }).join("");

        const etc = (showEtc && n === depth) ? `<span style="opacity:.55; margin-left:14px;">etc</span>` : "";

        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="left">${left}</div>
          <div class="mid"><span class="eq">=</span>${mid}</div>
          <div class="right">= ${CENTER}<span class="times">x</span>${m}${etc}</div>
        `;
        eqArea.appendChild(row);
      }
    }

    document.getElementById("depth").addEventListener("input", render);
    document.getElementById("showEtc").addEventListener("change", render);
    render();
  </script>
</body>
</html>
